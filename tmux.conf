# remap prefix
unbind C-b
set-option -g prefix C-space
bind-key C-space send-prefix

set -g mouse on
setw -g mode-keys vi

set-option -a terminal-features 'xterm-256color:RGB'

set-option -g repeat-time 500

# switch windows with alt + hl
bind -rn M-h previous-window
bind -rn M-l next-window

# resize panes with alt + shift + hjkl
bind -rn M-H resize-pane -L 5
bind -rn M-J resize-pane -D 5
bind -rn M-K resize-pane -U 5
bind -rn M-L resize-pane -R 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
